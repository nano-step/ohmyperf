name: Publish v0.1.0 (one-shot)

on:
  workflow_dispatch:

concurrency:
  group: publish-now
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v0.1.0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Verify on tag v0.1.0
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "0.1.0" ]; then
            echo "::error::Expected package.json version=0.1.0 (from tag v0.1.0), got $CURRENT"
            exit 1
          fi
          echo "Confirmed on v0.1.0 source tree"

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Build all publishables
        run: pnpm -r --filter "!@nhonh/website" --filter "!@nhonh/runner" --filter "!@nhonh/extension-chrome" --filter "!ohmyperf-vscode" build

      - name: Dry-run preview (final sanity)
        run: pnpm -r publish --dry-run --no-git-checks 2>&1 | grep -E "^\+ @ohmyperf|public access" | head -40

      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const match = changelog.match(/## \[0\.1\.0\][\s\S]*?(?=\n## \[|$)/);
            const body = match ? match[0] : '_See CHANGELOG.md_';
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'v0.1.0',
                name: 'ohmyperf v0.1.0 — first public release',
                body: body + '\n\n---\n\n**Install:**\n```bash\nnpm install -g @nhonh/cli\n# or for AI agent integration:\nnpm install -g @nhonh/mcp-server\n```\n\nAll 14 `@nhonh/*` packages published with tag `latest`.',
                prerelease: false,
                target_commitish: '${{ github.sha }}',
              });
              console.log('Release created');
            } catch (e) {
              if (e.status === 422) {
                console.log('Release already exists for v0.1.0 — skipping');
              } else {
                throw e;
              }
            }

      - name: Close harness dogfood issue
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body: 'Closed by automated v0.1.0 publish. 14 `@nhonh/*` packages live on npm registry; GitHub Release created at v0.1.0.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                state: 'closed',
              });
              console.log('Issue #1 closed');
            } catch (e) {
              console.log('Issue close failed (non-blocking):', e.message);
            }
