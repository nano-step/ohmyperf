# OhMyPerf — GitLab CI template
#
# Drop into the root of your repo (`.gitlab-ci.yml`) or include it from your
# existing pipeline with `include: { local: 'templates/ci/gitlab-ci.yml' }`.
#
# Configure these CI/CD variables in Settings → CI/CD → Variables:
#   OHMYPERF_URL   — target URL to measure (default: http://localhost:3000)
#   OHMYPERF_RUNS  — number of runs (default: 5)

stages:
  - measure

variables:
  OHMYPERF_URL: "http://localhost:3000"
  OHMYPERF_RUNS: "5"

ohmyperf:measure:
  stage: measure
  image: node:22-bookworm
  timeout: 15m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - npm install -g @ohmyperf/cli
    - ohmyperf install-browser
    - export OHMYPERF_CHROMIUM_PATH=$(find ~/.cache/ms-playwright /opt/playwright-browsers -type f -path '*/chromium-*/chrome-linux/chrome' 2>/dev/null | head -1)
    - test -n "$OHMYPERF_CHROMIUM_PATH" || (echo "Chromium binary not found after install" && exit 1)
  script:
    - |
      ohmyperf run "$OHMYPERF_URL" \
        --runs "$OHMYPERF_RUNS" \
        --mode ci-stable \
        --output ./perf \
        --format json,html,markdown,junit \
        --plugins all
    - |
      if [ -f .ohmyperf-baseline/report.json ]; then
        ohmyperf diff .ohmyperf-baseline/report.json perf/report.json
      else
        echo "No .ohmyperf-baseline/report.json found; skipping diff."
      fi
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - perf/report.json
      - perf/report.html
      - perf/report.md
    reports:
      junit: perf/report.junit.xml
